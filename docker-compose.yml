services:
  web-lb:
    image: nginx:stable
    container_name: web-lb
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./web-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-1
      - web-2

  web-1:
    build:
      context: ./web
      dockerfile: deploy/Dockerfile
    container_name: web-1
    restart: always
    environment:
      SERVER_ENDPOINT: http://app-lb:8080
      INSTANCE_NAME: web-1
    depends_on:
      - app-lb
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web-2:
    build:
      context: ./web
      dockerfile: deploy/Dockerfile
    container_name: web-2
    restart: always
    environment:
      SERVER_ENDPOINT: http://app-lb:8080
      INSTANCE_NAME: web-2
    depends_on:
      - app-lb
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  app-lb:
    image: nginx:stable
    container_name: app-lb
    restart: always
    volumes:
      - ./app-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2

  app-1:
    build:
      context: ./app
      dockerfile: deploy/Dockerfile
    container_name: app-1
    restart: always
    environment:
      MYSQL_HOST: db
      DB_USERNAME: admin
      DB_PASSWORD: root1234
      INSTANCE_NAME: app-1
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/v1.0/management/book/all"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  app-2:
    build:
      context: ./app
      dockerfile: deploy/Dockerfile
    container_name: app-2
    restart: always
    environment:
      MYSQL_HOST: db
      DB_USERNAME: admin
      DB_PASSWORD: root1234
      INSTANCE_NAME: app-2
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/v1.0/management/book/all"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: library
      MYSQL_USER: admin
      MYSQL_PASSWORD: root1234
    volumes:
      - mysql_data:/var/lib/mysql

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  web-1-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    container_name: web-1-exporter
    command:
      - -nginx.scrape-uri=http://web-1/nginx_status
    depends_on:
      - web-1
    restart: always

  web-2-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    container_name: web-2-exporter
    command:
      - -nginx.scrape-uri=http://web-2/nginx_status
    depends_on:
      - web-2
    restart: always
    
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always

volumes:
  mysql_data: