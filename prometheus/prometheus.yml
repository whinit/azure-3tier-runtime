global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'app-1'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app-1:8080']

  - job_name: 'app-2'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app-2:8080']

  - job_name: 'web-1'
    static_configs:
      - targets: ['web-1-exporter:9113']

  - job_name: 'web-2'
    static_configs:
      - targets: ['web-2-exporter:9113']